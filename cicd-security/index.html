<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI/CD Pipeline Security — GKE + Orca + ReliaQuest</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep:#0a0e1a;--bg-mid:#0f1629;--bg-card:#141b2d;--bg-card-hover:#1a2340;
  --border-subtle:rgba(255,255,255,0.06);--border-glow:rgba(255,255,255,0.12);
  --ci:#00d4ff;--ci-glow:rgba(0,212,255,0.3);--ci-bg:rgba(0,212,255,0.06);
  --cd:#ffb800;--cd-glow:rgba(255,184,0,0.3);--cd-bg:rgba(255,184,0,0.06);
  --gate:#ff3366;--gate-glow:rgba(255,51,102,0.4);
  --threat:#ff4444;--threat-bg:rgba(255,68,68,0.08);
  --gcp:#4285f4;--gcp-bg:rgba(66,133,244,0.1);
  --tools:#34d399;--tools-bg:rgba(52,211,153,0.1);
  --orca:#06b6d4;--orca-bg:rgba(6,182,212,0.1);
  --rq:#a78bfa;--rq-bg:rgba(167,139,250,0.1);
  --text1:#e8ecf4;--text2:#8892a8;--text3:#5a6478;
  --mono:'JetBrains Mono','Fira Code','Consolas',monospace;
  --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg-deep);color:var(--text1)}
@media(max-width:1100px){.header{flex-wrap:wrap;height:auto;padding:12px 20px;gap:8px}.header-left h1{font-size:1.2rem}.header-left .sub{font-size:.78rem}.hbadges{gap:6px}.hb{font-size:.6rem;padding:4px 10px}}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 25%,rgba(255,51,102,0.03) 0%,transparent 50%),radial-gradient(ellipse at 25% 60%,rgba(0,212,255,0.03) 0%,transparent 40%),radial-gradient(ellipse at 80% 50%,rgba(255,184,0,0.03) 0%,transparent 40%);pointer-events:none;z-index:0}

.header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 44px;background:linear-gradient(180deg,rgba(10,14,26,0.97),rgba(10,14,26,0.85));backdrop-filter:blur(8px);border-bottom:1px solid var(--border-subtle);height:80px}
.header-left h1{font-family:var(--mono);font-size:1.7rem;font-weight:700;letter-spacing:.06em;background:linear-gradient(135deg,var(--ci),#fff,var(--cd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-left .sub{font-size:.95rem;color:var(--text2);margin-top:4px}
.hbadges{display:flex;gap:12px}
.hb{font-family:var(--mono);font-size:.72rem;padding:6px 16px;border-radius:4px;font-weight:500;letter-spacing:.05em}
.hb.g{background:var(--gcp-bg);color:var(--gcp);border:1px solid rgba(66,133,244,.25)}
.hb.k{background:rgba(50,108,229,.1);color:#326ce5;border:1px solid rgba(50,108,229,.25)}
.hb.o{background:var(--orca-bg);color:var(--orca);border:1px solid rgba(6,182,212,.25)}
.hb.r{background:var(--rq-bg);color:var(--rq);border:1px solid rgba(167,139,250,.25)}

.canvas{position:fixed;top:80px;left:0;right:0;bottom:0;overflow:hidden}
.canvas-inner{position:absolute;width:1940px;height:1040px;transform-origin:top left;will-change:transform}
.csvg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none;overflow:visible}

.fl{fill:none;stroke-linecap:round;stroke-width:3;stroke-dasharray:14 10;animation:dashAnim 2s linear infinite}
.fl-ci{stroke:#00d4ff;opacity:.7}
.fl-cd{stroke:#ffb800;opacity:.7}
.fl-gt{stroke:#ff3366;opacity:.75}
.fl-fb{stroke:#ffb800;opacity:.45;stroke-dasharray:12 8;stroke-width:2.5;animation:dashAnim 3.5s linear infinite}
@keyframes dashAnim{to{stroke-dashoffset:-72}}
.gl{fill:none;stroke-linecap:round;stroke-width:12;filter:blur(6px);opacity:.15}
.gl-ci{stroke:#00d4ff}.gl-cd{stroke:#ffb800}.gl-gt{stroke:#ff3366}

.sc{position:absolute;width:320px;height:320px;background:var(--bg-card);border-radius:50%;padding:38px 28px 24px;cursor:pointer;transition:all .3s ease;z-index:10;opacity:0;transform:translateY(12px);animation:appear .5s ease-out forwards;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
@keyframes appear{to{opacity:1;transform:translateY(0)}}
.sc.ci{border:2.5px solid var(--ci);box-shadow:0 0 18px rgba(0,212,255,.12),inset 0 0 30px rgba(0,212,255,.03);animation:appear .5s ease-out forwards,ciPulse 4s ease-in-out infinite}
.sc.cd{border:2.5px solid var(--cd);box-shadow:0 0 18px rgba(255,184,0,.12),inset 0 0 30px rgba(255,184,0,.03);animation:appear .5s ease-out forwards,cdPulse 4s ease-in-out infinite}
@keyframes ciPulse{0%,100%{box-shadow:0 0 18px rgba(0,212,255,.12),inset 0 0 30px rgba(0,212,255,.03)}50%{box-shadow:0 0 28px rgba(0,212,255,.2),inset 0 0 30px rgba(0,212,255,.05)}}
@keyframes cdPulse{0%,100%{box-shadow:0 0 18px rgba(255,184,0,.12),inset 0 0 30px rgba(255,184,0,.03)}50%{box-shadow:0 0 28px rgba(255,184,0,.2),inset 0 0 30px rgba(255,184,0,.05)}}
.sc::before{display:none}
.sc:hover{background:var(--bg-card-hover);transform:translateY(-4px)!important}
.sc.ci:hover{box-shadow:0 0 35px rgba(0,212,255,.25),inset 0 0 30px rgba(0,212,255,.05);border-color:rgba(0,212,255,.9)}
.sc.cd:hover{box-shadow:0 0 35px rgba(255,184,0,.25),inset 0 0 30px rgba(255,184,0,.05);border-color:rgba(255,184,0,.9)}
.snum{font-family:var(--mono);font-size:1.1rem;font-weight:700;letter-spacing:.1em;color:var(--text2);margin-bottom:3px}
.sico{font-size:2.475rem;margin-bottom:5px;display:block;line-height:1}
.snam{font-family:var(--mono);font-size:1.386rem;font-weight:700;letter-spacing:.04em;margin-bottom:3px}
.sc.ci .snam{color:var(--ci)}.sc.cd .snam{color:var(--cd)}
.ssub{font-size:1.1rem;color:var(--text2);margin-bottom:8px;line-height:1.3}
.sthr{font-family:var(--mono);font-size:.946rem;color:var(--threat);opacity:.9;margin-bottom:0}
.drow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;justify-content:center}
.dp{font-family:var(--mono);font-size:.836rem;padding:2px 8px;border-radius:3px;font-weight:500}
.dp.gc{color:var(--gcp);background:var(--gcp-bg)}.dp.tl{color:var(--tools);background:var(--tools-bg)}.dp.oc{color:var(--orca);background:var(--orca-bg)}.dp.rq{color:var(--rq);background:var(--rq-bg)}
.chint{display:none}

.inst-note{position:absolute;z-index:8;font-family:var(--mono);font-size:1.08rem;color:var(--text2);letter-spacing:.04em;text-align:left;opacity:0;animation:appear .5s ease-out .9s forwards;pointer-events:none}
.inst-note .inst-ico{font-size:1.3rem;margin-bottom:3px;display:inline;margin-right:6px;opacity:.7}
.inst-note .inst-txt{background:rgba(255,255,255,.03);border:1px solid var(--border-subtle);border-radius:8px;padding:8px 18px;white-space:nowrap}

.tp{position:absolute;font-family:var(--mono);font-size:.75rem;color:var(--threat);background:var(--threat-bg);border:1px solid rgba(255,68,68,.18);padding:4px 12px;border-radius:3px;white-space:nowrap;z-index:9;pointer-events:none;animation:tpf 4s ease-in-out infinite}
.tp::before{content:'\26A0 ';font-size:.65rem}
@keyframes tpf{0%,100%{opacity:.5;transform:translateY(0)}50%{opacity:.9;transform:translateY(-2px)}}
.tp-wrap{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;z-index:9;pointer-events:none}
.tp-wrap .tp{position:static}

.gc4{position:absolute;z-index:15;cursor:pointer;transition:all .3s ease;opacity:0;animation:appear .5s ease-out .3s forwards,gg 3s ease-in-out infinite}
.gc4:hover{transform:scale(1.04)}
.gc4:hover .gpil{border-color:rgba(255,51,102,.5);box-shadow:0 0 24px rgba(255,51,102,.25)}
.gstr{display:flex;align-items:stretch;position:relative}
.gpil{width:31px;background:linear-gradient(180deg,rgba(255,51,102,.18),rgba(255,51,102,.06));border:1px solid rgba(255,51,102,.35);border-radius:5px;position:relative;transition:all .3s}
.gpil::before{content:'';position:absolute;top:8px;left:6px;right:6px;height:10px;background:var(--gate);border-radius:2px;opacity:.6}
.gpil::after{content:'';position:absolute;bottom:8px;left:6px;right:6px;height:10px;background:var(--gate);border-radius:2px;opacity:.6}
.gcb{position:absolute;top:-10px;left:-8px;right:-8px;height:20px;background:rgba(255,51,102,.15);border:1px solid rgba(255,51,102,.35);border-radius:4px;display:flex;align-items:center;justify-content:center}
.gcbl{font-family:var(--mono);font-size:.814rem;font-weight:700;color:var(--gate);letter-spacing:.1em;white-space:nowrap}
.gin{width:251px;padding:34px 18px 18px;display:flex;flex-direction:column;align-items:center;text-align:center}
.gico{font-size:2.75rem;margin-bottom:8px}
.gttl{font-family:var(--mono);font-size:1.463rem;font-weight:700;color:var(--gate);margin-bottom:4px}
.gsub{font-size:1.1rem;color:var(--text2);margin-bottom:10px;line-height:1.3}
.gln{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--gate),transparent);margin:10px 0;opacity:.4}
.gdp{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.gthr{font-family:var(--mono);font-size:.946rem;color:var(--threat);opacity:.9;margin-bottom:8px}
@keyframes gg{0%,100%{box-shadow:0 0 15px rgba(255,51,102,.1)}50%{box-shadow:0 0 35px rgba(255,51,102,.25)}}

.mo{position:fixed;inset:0;background:rgba(5,8,18,.85);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:30px;opacity:0;transition:opacity .3s ease}
.mo.on{display:flex;opacity:1}
.md{background:var(--bg-mid);border:1px solid var(--border-glow);border-radius:12px;max-width:1280px;width:100%;max-height:85vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s ease;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.mo.on .md{transform:translateY(0)}
.md::-webkit-scrollbar{width:6px}.md::-webkit-scrollbar-track{background:transparent}.md::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.mh{padding:24px 28px 18px;border-bottom:1px solid var(--border-subtle);position:sticky;top:0;background:var(--bg-mid);z-index:10;display:flex;justify-content:space-between;align-items:flex-start}
.mhl{flex:1}
.msn{font-family:var(--mono);font-size:.78rem;font-weight:600;letter-spacing:.1em;color:var(--text3);margin-bottom:3px}
.mtt{font-family:var(--mono);font-size:1.6rem;font-weight:700;margin-bottom:3px}
.mtt.ci{color:var(--ci)}.mtt.cd{color:var(--cd)}.mtt.gate{color:var(--gate)}
.mst{font-size:.92rem;color:var(--text2)}
.mcl{background:none;border:1px solid var(--border-subtle);color:var(--text2);font-size:1.1rem;cursor:pointer;padding:6px 12px;border-radius:4px;font-family:var(--mono);transition:all .2s}
.mcl:hover{background:rgba(255,255,255,.05);color:var(--text1)}
.mb{padding:20px 28px 28px}
.mdesc{font-size:.95rem;color:var(--text2);line-height:1.65;margin-bottom:24px;padding:14px;background:rgba(255,255,255,.02);border-radius:6px;border-left:3px solid var(--text3)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.msec{background:rgba(255,255,255,.02);border:1px solid var(--border-subtle);border-radius:8px;padding:16px}
.msec.threats{border-color:rgba(255,68,68,.2)}.msec.gcp{border-color:rgba(66,133,244,.2)}.msec.tools{border-color:rgba(52,211,153,.2)}.msec.orca{border-color:rgba(6,182,212,.2)}.msec.rq{border-color:rgba(167,139,250,.2)}
.stit{font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.stit .dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.stit.threats{color:var(--threat)}.stit.threats .dot{background:var(--threat)}
.stit.gcp{color:var(--gcp)}.stit.gcp .dot{background:var(--gcp)}
.stit.tools{color:var(--tools)}.stit.tools .dot{background:var(--tools)}
.stit.orca{color:var(--orca)}.stit.orca .dot{background:var(--orca)}
.stit.rq{color:var(--rq)}.stit.rq .dot{background:var(--rq)}
.di{margin-bottom:10px}.di:last-child{margin-bottom:0}
.dn{font-family:var(--mono);font-size:.78rem;font-weight:600;margin-bottom:2px}
.threats .dn{color:var(--threat)}.gcp .dn{color:var(--gcp)}.tools .dn{color:var(--tools)}.orca .dn{color:var(--orca)}.rq .dn{color:var(--rq)}
.dd{font-size:.78rem;color:var(--text2);line-height:1.45}
.nat{font-family:var(--mono);font-size:.72rem;color:var(--text3);font-style:italic}
.mincident{margin-top:20px;background:linear-gradient(135deg,rgba(255,184,0,0.04),rgba(255,51,102,0.04));border:1px solid rgba(255,184,0,0.2);border-radius:8px;padding:18px 20px;position:relative;overflow:hidden}
.mincident::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cd),var(--gate));opacity:.6}
.mincident-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mincident-ico{font-size:1.1rem}
.mincident-label{font-family:var(--mono);font-size:.78rem;font-weight:700;letter-spacing:.1em;color:var(--cd);text-transform:uppercase}
.mincident-year{font-family:var(--mono);font-size:.72rem;color:var(--text3);margin-left:auto;background:rgba(255,184,0,0.1);padding:3px 10px;border-radius:3px}
.mincident-name{font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--text1);margin-bottom:8px}
.mincident-body{font-size:.9rem;color:var(--text2);line-height:1.55;margin-bottom:12px}
.mincident-lesson{font-size:.86rem;color:var(--cd);line-height:1.5;padding:10px 14px;background:rgba(255,184,0,0.06);border-radius:5px;border-left:3px solid var(--cd)}
.sc[data-stage="1"]{animation-delay:.05s,.05s}.sc[data-stage="2"]{animation-delay:.15s,.15s}.sc[data-stage="3"]{animation-delay:.25s,.25s}.sc[data-stage="5"]{animation-delay:.45s,.45s}.sc[data-stage="6"]{animation-delay:.55s,.55s}.sc[data-stage="7"]{animation-delay:.65s,.65s}.sc[data-stage="8"]{animation-delay:.75s,.75s}

/* === AUTOMATE BUTTON === */
.abtn{position:absolute;top:14px;right:auto;left:50%;transform:translateX(-50%);z-index:12;display:flex;align-items:center;gap:6px;padding:4px 14px 4px 10px;border-radius:20px;border:1px solid rgba(16,185,129,.35);background:rgba(16,185,129,.1);cursor:pointer;transition:all .25s ease;font-family:var(--mono);font-size:.864rem;font-weight:600;letter-spacing:.06em;color:#10b981;text-transform:uppercase;white-space:nowrap;backdrop-filter:blur(4px)}
.abtn:hover{background:rgba(16,185,129,.22);border-color:rgba(16,185,129,.6);box-shadow:0 0 14px rgba(16,185,129,.25);transform:translateX(-50%) scale(1.05)}
.abtn:active{transform:translateX(-50%) scale(.97)}
.abtn .abico{font-size:1.008rem;line-height:1;display:flex;align-items:center}
.abtn .abpulse{width:9px;height:9px;border-radius:50%;background:#10b981;animation:abp 2s ease-in-out infinite;flex-shrink:0}
@keyframes abp{0%,100%{opacity:.4;box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{opacity:1;box-shadow:0 0 0 4px rgba(16,185,129,0)}}

/* Gate card automate button override */
.gc4 .abtn{top:16px;bottom:auto;left:50%;right:auto;transform:translateX(-50%)}
.gc4 .abtn:hover{transform:translateX(-50%) scale(1.05)}
.gc4 .abtn:active{transform:translateX(-50%) scale(.97)}

/* === AUTOMATION MODAL === */
.amo{position:fixed;inset:0;background:rgba(5,8,18,.88);backdrop-filter:blur(10px);z-index:1001;display:none;align-items:center;justify-content:center;padding:30px;opacity:0;transition:opacity .3s ease}
.amo.on{display:flex;opacity:1}
.amd{background:var(--bg-mid);border:1px solid rgba(16,185,129,.25);border-radius:14px;max-width:900px;width:100%;max-height:85vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s ease;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.amo.on .amd{transform:translateY(0)}
.amd::-webkit-scrollbar{width:6px}.amd::-webkit-scrollbar-track{background:transparent}.amd::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.amd::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:3px;border-radius:14px 14px 0 0;background:linear-gradient(90deg,#10b981,#34d399,#10b981);box-shadow:0 0 16px rgba(16,185,129,.4)}
.amh{padding:24px 28px 18px;border-bottom:1px solid var(--border-subtle);position:sticky;top:0;background:var(--bg-mid);z-index:10;display:flex;justify-content:space-between;align-items:flex-start;border-radius:14px 14px 0 0}
.amhl{flex:1}
.amsn{font-family:var(--mono);font-size:.68rem;font-weight:600;letter-spacing:.1em;color:#10b981;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.amsn::before{content:'';width:7px;height:7px;border-radius:50%;background:#10b981;animation:abp 2s ease-in-out infinite}
.amtt{font-family:var(--mono);font-size:1.4rem;font-weight:700;color:#34d399;margin-bottom:3px}
.amst{font-size:.82rem;color:var(--text2)}
.amcl{background:none;border:1px solid var(--border-subtle);color:var(--text2);font-size:1.1rem;cursor:pointer;padding:6px 12px;border-radius:4px;font-family:var(--mono);transition:all .2s}
.amcl:hover{background:rgba(255,255,255,.05);color:var(--text1)}
.amb{padding:20px 28px 28px}

.amchallenge{font-size:.88rem;color:var(--text2);line-height:1.65;margin-bottom:24px;padding:16px;background:rgba(255,68,68,.04);border-radius:8px;border-left:3px solid var(--threat)}
.amchallenge .amcl-title{font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.1em;color:var(--threat);margin-bottom:8px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.amchallenge .amcl-title::before{content:'\26A0';font-size:.65rem}

.amlist{display:flex;flex-direction:column;gap:14px}
.amai{background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.15);border-radius:8px;padding:16px;transition:all .2s ease}
.amai:hover{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.07)}
.amai-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.amai-ico{width:28px;height:28px;border-radius:6px;background:rgba(16,185,129,.12);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.amai-n{font-family:var(--mono);font-size:.82rem;font-weight:700;color:#34d399}
.amai-tag{font-family:var(--mono);font-size:.55rem;padding:2px 7px;border-radius:3px;font-weight:600;letter-spacing:.06em;margin-left:auto;flex-shrink:0}
.amai-tag.agent{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.amai-tag.auto{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.25)}
.amai-tag.ml{background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.25)}
.amai-d{font-size:.8rem;color:var(--text2);line-height:1.55}
.amai-tools{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap}
.amai-tool{font-family:var(--mono);font-size:.58rem;padding:2px 8px;border-radius:3px;background:rgba(255,255,255,.04);color:var(--text3);border:1px solid var(--border-subtle)}

/* === SCORING TABLE === */
.score-tbl{width:100%;border-collapse:separate;border-spacing:0;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid var(--border-subtle)}
.score-tbl thead th{font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 8px;background:rgba(255,255,255,.03);color:var(--text2);border-bottom:1px solid var(--border-subtle);text-align:center;white-space:nowrap}
.score-tbl thead th:first-child{text-align:left;padding-left:14px;min-width:180px}
.score-tbl tbody tr{transition:background .15s}
.score-tbl tbody tr:hover{background:rgba(255,255,255,.02)}
.score-tbl tbody td{padding:10px 8px;font-size:.76rem;color:var(--text2);border-bottom:1px solid var(--border-subtle);text-align:center;vertical-align:middle}
.score-tbl tbody td:first-child{text-align:left;padding-left:14px;font-family:var(--mono);font-weight:600;color:var(--text1);font-size:.72rem}
.score-tbl tbody tr:last-child td{border-bottom:none}

/* Priority badges */
.pri{font-family:var(--mono);font-size:.6rem;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.06em;white-space:nowrap;display:inline-block}
.pri-1{background:rgba(16,185,129,.18);color:#34d399;border:1px solid rgba(16,185,129,.35);box-shadow:0 0 8px rgba(16,185,129,.15)}
.pri-2{background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.25)}
.pri-3{background:rgba(255,184,0,.1);color:#ffb800;border:1px solid rgba(255,184,0,.25)}
.pri-4{background:rgba(255,68,68,.1);color:#ff6666;border:1px solid rgba(255,68,68,.2)}

/* Score pills */
.spill{font-family:var(--mono);font-size:.58rem;font-weight:600;padding:2px 8px;border-radius:3px;white-space:nowrap;display:inline-block}
.sp-safe-low{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.sp-safe-med{background:rgba(255,184,0,.1);color:#ffb800;border:1px solid rgba(255,184,0,.2)}
.sp-safe-hi{background:rgba(255,68,68,.1);color:#ff6666;border:1px solid rgba(255,68,68,.2)}
.sp-mat-now{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.sp-mat-emerging{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
.sp-mat-experimental{background:rgba(255,68,68,.1);color:#ff6666;border:1px solid rgba(255,68,68,.2)}
.sp-ease-easy{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.sp-ease-moderate{background:rgba(0,212,255,.1);color:#00d4ff;border:1px solid rgba(0,212,255,.2)}
.sp-ease-hard{background:rgba(255,184,0,.1);color:#ffb800;border:1px solid rgba(255,184,0,.2)}
.sp-ease-vhard{background:rgba(255,68,68,.1);color:#ff6666;border:1px solid rgba(255,68,68,.2)}
.sp-imp-crit{background:rgba(255,51,102,.12);color:#ff3366;border:1px solid rgba(255,51,102,.25);font-weight:700}
.sp-imp-high{background:rgba(255,184,0,.1);color:#ffb800;border:1px solid rgba(255,184,0,.2)}
.sp-imp-med{background:rgba(0,212,255,.08);color:#66d9ff;border:1px solid rgba(0,212,255,.15)}

/* Scoring row inside amai card */
.amai-scores{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-subtle)}
.amai-score-item{display:flex;align-items:center;gap:4px}
.amai-score-label{font-family:var(--mono);font-size:.52rem;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}

/* Priority header in table */
.pri-rank{font-family:var(--mono);font-size:.68rem;font-weight:700;color:var(--text3);margin-right:6px}

/* Section divider between table and cards */
.am-section-title{font-family:var(--mono);font-size:.68rem;font-weight:700;letter-spacing:.1em;color:var(--text2);margin:20px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border-subtle);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.am-section-title::before{content:'';width:12px;height:2px;background:#10b981;border-radius:1px}

/* === THREAT-CENTRIC MODAL LAYOUT === */
.m-layout{display:flex;gap:20px;min-height:420px}
.m-threats-col{width:38%;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.m-controls-col{width:62%;position:sticky;top:0;align-self:flex-start}

/* Threat cards */
.m-tcard{cursor:pointer;padding:14px 16px;border-radius:8px;border:1px solid rgba(255,68,68,.12);background:rgba(255,68,68,.03);transition:all .3s ease;position:relative}
.m-tcard:hover{border-color:rgba(255,68,68,.3);background:rgba(255,68,68,.06)}
.m-tcard.active{border-color:rgba(255,68,68,.5);background:rgba(255,68,68,.1);box-shadow:0 0 16px rgba(255,68,68,.12)}
.m-tcard-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.m-tcard .sev{font-family:var(--mono);font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:.06em;flex-shrink:0}
.sev-critical{background:rgba(255,51,102,.18);color:#ff3366;border:1px solid rgba(255,51,102,.35);animation:sevPulse 3s ease-in-out infinite}
.sev-high{background:rgba(255,184,0,.12);color:#ffb800;border:1px solid rgba(255,184,0,.3)}
.sev-medium{background:rgba(0,212,255,.1);color:#66d9ff;border:1px solid rgba(0,212,255,.2)}
.sev-low{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
@keyframes sevPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,51,102,0)}50%{box-shadow:0 0 8px 2px rgba(255,51,102,.15)}}
.m-tcard .tname{font-family:var(--mono);font-size:.88rem;font-weight:700;color:var(--text1)}
.m-tcard .tscore{font-family:var(--mono);font-size:.65rem;color:var(--text3);margin-left:auto;white-space:nowrap}
.m-tcard .tdesc{font-size:.86rem;color:var(--text2);line-height:1.5;margin-bottom:6px}
.m-tcard .tresidual{font-size:.82rem;color:var(--text3);line-height:1.45;padding:8px 12px;background:rgba(255,255,255,.02);border-radius:4px;border-left:2px solid rgba(255,68,68,.25);display:none}
.m-tcard.active .tresidual{display:block}
.m-tcard .trole-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;display:none}
.m-tcard.active .trole-tags{display:flex}
.trole{font-family:var(--mono);font-size:.62rem;padding:3px 8px;border-radius:3px;font-weight:600;letter-spacing:.05em}
.trole-prevent{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.trole-detect{background:rgba(0,212,255,.1);color:#00d4ff;border:1px solid rgba(0,212,255,.2)}
.trole-respond{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
.m-tcard .tclick-hint{font-family:var(--mono);font-size:.6rem;color:var(--text3);position:absolute;bottom:4px;right:8px;opacity:.5;transition:opacity .2s}
.m-tcard:hover .tclick-hint{opacity:.8}
.m-tcard.active .tclick-hint{display:none}

/* Impact/Likelihood meter */
.m-tcard .tmeter{display:flex;align-items:center;gap:10px;margin-top:4px;margin-bottom:4px}
.tmeter-item{display:flex;align-items:center;gap:4px}
.tmeter-label{font-family:var(--mono);font-size:.6rem;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.tmeter-dots{display:flex;gap:2px}
.tmeter-dot{width:8px;height:8px;border-radius:2px;background:rgba(255,255,255,.08);transition:background .3s}
.tmeter-dot.on{background:var(--threat)}
.tmeter-dot.on.t4,.tmeter-dot.on.t5{background:#ff3366}

/* Controls column */
.m-ctrl-group{margin-bottom:14px}
.m-ctrl-group-title{font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.m-ctrl-group-title .gdot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.m-ctrl-group.gcp .m-ctrl-group-title{color:var(--gcp)}.m-ctrl-group.gcp .gdot{background:var(--gcp)}
.m-ctrl-group.tools .m-ctrl-group-title{color:var(--tools)}.m-ctrl-group.tools .gdot{background:var(--tools)}
.m-ctrl-group.orca .m-ctrl-group-title{color:var(--orca)}.m-ctrl-group.orca .gdot{background:var(--orca)}
.m-ctrl-group.rq .m-ctrl-group-title{color:var(--rq)}.m-ctrl-group.rq .gdot{background:var(--rq)}
.m-ctrl-item{padding:10px 14px;border-radius:6px;border:1px solid var(--border-subtle);margin-bottom:6px;transition:all .4s ease;background:rgba(255,255,255,.015)}
.m-ctrl-item.dimmed{opacity:.12;transform:scale(.98)}
.m-ctrl-item.hl-gcp{border-color:rgba(66,133,244,.4);background:rgba(66,133,244,.08);box-shadow:0 0 10px rgba(66,133,244,.08)}
.m-ctrl-item.hl-tools{border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.08);box-shadow:0 0 10px rgba(52,211,153,.08)}
.m-ctrl-item.hl-orca{border-color:rgba(6,182,212,.4);background:rgba(6,182,212,.08);box-shadow:0 0 10px rgba(6,182,212,.08)}
.m-ctrl-item.hl-rq{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.08);box-shadow:0 0 10px rgba(167,139,250,.08)}
.m-ctrl-item .ctrl-name{font-family:var(--mono);font-size:.82rem;font-weight:600;margin-bottom:2px}
.m-ctrl-group.gcp .ctrl-name{color:var(--gcp)}.m-ctrl-group.tools .ctrl-name{color:var(--tools)}.m-ctrl-group.orca .ctrl-name{color:var(--orca)}.m-ctrl-group.rq .ctrl-name{color:var(--rq)}
.m-ctrl-item .ctrl-desc{font-size:.82rem;color:var(--text2);line-height:1.45}
.m-ctrl-item .ctrl-role-badge{display:none;margin-top:4px}
.m-ctrl-item.hl-gcp .ctrl-role-badge,.m-ctrl-item.hl-tools .ctrl-role-badge,.m-ctrl-item.hl-orca .ctrl-role-badge,.m-ctrl-item.hl-rq .ctrl-role-badge{display:inline-block}

/* Column header labels */
.m-col-label{font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:6px}
.m-col-label.threats-label{color:var(--threat)}.m-col-label.ctrl-label{color:var(--text2)}
.m-col-label::before{content:'';width:10px;height:2px;border-radius:1px}
.m-col-label.threats-label::before{background:var(--threat)}.m-col-label.ctrl-label::before{background:var(--text3)}

/* Coverage indicator on threat card when active */
.m-tcard .tcoverage{display:none;margin-top:6px;font-family:var(--mono);font-size:.65rem;color:var(--text3)}
.m-tcard.active .tcoverage{display:flex;gap:10px;flex-wrap:wrap}
.tcov-item{display:flex;align-items:center;gap:3px}
.tcov-dot{width:5px;height:5px;border-radius:50%}
.tcov-dot.gcp{background:var(--gcp)}.tcov-dot.tools{background:var(--tools)}.tcov-dot.orca{background:var(--orca)}.tcov-dot.rq{background:var(--rq)}

</style>

<script>
var S=[
{id:1,n:"SOURCE CODE",st:"Version Control, Secrets & SAST Gate",ic:"\u{1F4DD}",lp:"CI PIPELINE",t:"ci",desc:"Where all code, IaC templates (Terraform, Helm), and Kubernetes manifests originate. The first attack surface \u2014 if source is compromised, everything downstream inherits the risk. SAST runs here as a PR gate: webhooks trigger automated scans on every pull request, blocking merge on critical findings before the developer has moved on.",th:[{n:"Credential Leakage",d:"API keys, service account JSON, and secrets hardcoded or committed to repos"},{n:"Undetected Code Vulns (pre-build)",d:"SQL injection, XSS, SSRF, and deserialization flaws catchable at source \u2014 the cheapest point to fix. SAST as a PR gate blocks these before they ever reach the build stage"},{n:"Dependency Confusion",d:"Attackers publish malicious packages with names matching internal dependencies"},{n:"Malicious Commits",d:"Compromised developer accounts pushing backdoored code or IaC changes"},{n:"Unsigned Commits",d:"No cryptographic proof of commit authorship enables impersonation"},{n:"Typosquatting",d:"Near-identical package names in npm/PyPI registries delivering malware"}],gcp:[{n:"Secret Manager",d:"Centralized secret storage with automatic rotation, IAM-bound access, and audit logging"},{n:"Secure Source Manager",d:"Regionally deployed, single-tenant managed Git hosting with IAM integration, VPC Service Controls support, and Artifact Registry integration"},{n:"Cloud KMS",d:"Managed keys for GPG commit signing and secret envelope encryption"},{n:"VPC Service Controls",d:"Prevent secret exfiltration by restricting API access to trusted perimeters"}],tl:[{n:"Semgrep (PR Gate SAST)",d:"Webhook-triggered on every pull request. Scans source code for injection flaws, auth issues, and custom security patterns. Posts findings as PR comments and can block merge on critical severity. Developer gets feedback while the code is still fresh \u2014 the optimal fix window."},{n:"SonarQube (PR Gate SAST)",d:"Comprehensive code quality and security analysis triggered on PR open/update via webhook. Quality gate enforcement: PRs failing security thresholds are blocked from merging. Covers OWASP Top 10, CWE Top 25, and custom organizational rulesets."},{n:"CodeQL / GitHub Advanced Security",d:"GitHub's semantic code analysis engine. Runs as a PR check, tracing data flows through the entire application to find vulnerabilities SAST tools miss. Also monitors the build process tree during compilation \u2014 essential for catching vulnerabilities in compiled languages that source-only SAST misses."},{n:"Pre-commit Hooks",d:"gitleaks, truffleHog: scan for secrets before code reaches the remote. Note: high maintenance burden in practice \u2014 valuable but not a substitute for PR-gate scanning."},{n:"Branch Protection",d:"Require PR reviews, passing SAST status checks, and signed commits on main/release branches. The enforcement mechanism that makes PR-gate SAST blocking rather than advisory."},{n:"Dependency Pinning",d:"Lock files with hash verification (package-lock.json, go.sum)"},{n:"Renovate / Dependabot",d:"Automated dependency updates with vulnerability alerting"},{n:"CODEOWNERS",d:"Enforce review requirements from specific teams for sensitive paths"},{n:"Threat Modeling (STRIDE/PASTA)",d:"Structured threat identification during design and code review. STRIDE for spoofing/tampering/repudiation/info-disclosure/DoS/elevation-of-privilege analysis. Attack trees for complex threat scenarios. Feeds threat intelligence into security requirements before code is written"}],orca:null,rq:null,incident:{year:"2024",name:"XZ Utils Backdoor (CVE-2024-3094)",summary:"A threat actor using the alias 'Jia Tan' spent nearly 3 years building trust as a contributor to the XZ Utils open-source project. After gaining maintainer access through social engineering (including sock puppet accounts pressuring the original maintainer), they injected a sophisticated backdoor into liblzma that would have enabled unauthenticated remote code execution on any Linux system running SSH with systemd. The backdoor was only caught by chance when a Microsoft engineer noticed a 500ms SSH latency regression. CVSS 10.0.",lesson:"Commit signing, CODEOWNERS review requirements, and maintainer identity verification are not optional. This attack would have been mitigated by enforcing GPG-signed commits and requiring multi-party review on all changes to build infrastructure files. The 'benevolent stranger' attack pattern \u2014 where an attacker slowly builds trust over years \u2014 is now a proven nation-state technique."}},
{id:2,n:"BUILD",st:"Container Image Construction",ic:"\u{1F3D7}\uFE0F",lp:"CI PIPELINE",t:"ci",desc:"Container images are assembled from base images, application code, and dependencies. Build environments are high-value targets \u2014 a compromised build produces trusted-looking malicious artifacts at scale.",th:[{n:"Poisoned Base Images",d:"Compromised or outdated base images propagate vulnerabilities to every downstream image"},{n:"Build Env Tampering",d:"Persistent build workers with writable caches enable supply-chain injection"},{n:"Dependency Hijacking",d:"Compromised upstream libraries injected during build resolution"},{n:"Build Secret Leakage",d:"Secrets used during build baked into image layers"},{n:"Lack of Provenance",d:"No cryptographic attestation of what was built, by whom, from which source"}],gcp:[{n:"Cloud Build",d:"Serverless, ephemeral build workers with no persistent state between builds"},{n:"Artifact Registry",d:"Managed base image hosting with vulnerability scanning and lifecycle policies"},{n:"Cloud KMS + SLSA",d:"Generate SLSA Level 3 provenance attestations signed with Cloud KMS keys"},{n:"Workload Identity Federation",d:"Keyless authentication from external CI systems (GitHub Actions, GitLab CI, Jenkins, Harness) into GCP — no long-lived service account keys. Critical for multi-platform CI environments where not all builds run on Cloud Build"}],tl:[{n:"Distroless Images",d:"Google\u2019s distroless bases: no shell, no package manager, minimal CVE surface"},{n:"Multi-stage Builds",d:"Separate build-time deps from runtime image"},{n:"Kaniko / ko",d:"Daemonless, rootless container builds without Docker socket exposure"},{n:"Hermetic Builds",d:"All inputs declared and pinned; builds reproducible regardless of environment"},{n:"BuildKit Secrets",d:"Mount secrets during build without persisting in image layers"}],orca:null,rq:null,incident:{year:"2021",name:"Codecov Bash Uploader Compromise",summary:"Attackers exploited a flaw in Codecov\u2019s Docker image creation process to extract credentials, then modified the Bash Uploader script. For 2+ months (Jan\u2013Apr 2021), the tampered script silently exfiltrated CI environment variables from every customer\u2019s build environment. Hundreds of downstream networks were breached including HashiCorp (GPG signing key exposed). FBI investigated. 29,000+ customers affected.",lesson:"Build environments are treasure troves of secrets. Ephemeral, stateless build workers (like Cloud Build) eliminate persistent compromise risk. Cryptographic verification of all build tooling (checksum validation) would have detected the modified uploader. Never store production credentials in CI environment variables."}},
{id:3,n:"SCA & IaC",st:"Artifact Composition & Config Gate",ic:"\u{1F9EA}",lp:"CI PIPELINE",t:"ci",desc:"Source SAST already ran at Stage 1 as a PR gate. This stage handles what can only be verified post-build: Software Composition Analysis on the assembled artifact (dependency tree as actually resolved, not just declared), IaC security scanning, and CodeQL\u2019s build-time monitoring for compiled languages. Compiled code can no longer be read statically by most SAST tools \u2014 these checks fill the gaps.",th:[{n:"IaC Misconfigurations",d:"Overly permissive GKE RBAC, missing NetworkPolicies, or public-facing LoadBalancers in Terraform \u2014 only detectable by scanning the rendered manifests, not source"},{n:"Dependency Resolution Drift",d:"Package manager resolves a different version than declared in lockfiles due to range specifiers or upstream changes \u2014 only visible in the built artifact"},{n:"Compiler-Induced Vulnerabilities",d:"Vulnerabilities introduced during compilation that are invisible in source: statically linked libraries, vendored deps, or build-injected configurations"},{n:"Build Secret Baking",d:"Secrets injected during build that end up baked into the artifact despite BuildKit secrets mounts"},{n:"License Violations",d:"Copyleft or restricted licenses in dependencies creating legal/compliance exposure \u2014 resolved at build time, not always visible in lockfiles"}],gcp:[{n:"Cloud Build Steps",d:"Integrate SCA and IaC scanners as native build steps with pass/fail gates after the build completes"},{n:"On-Demand Scanning",d:"API-driven container analysis callable mid-pipeline before registry push"}],tl:[{n:"SCA (Snyk / Socket.dev)",d:"Software Composition Analysis on the built artifact: dependency vulnerability scanning against the actual resolved tree, license compliance, and behavioral signals for malicious packages (new maintainers, typosquatting). Runs post-build because the resolved dependency graph only exists after build."},{n:"Checkov / tfsec",d:"IaC scanners for Terraform, Helm, and K8s manifests against CIS benchmarks. Catches misconfigurations in rendered infrastructure declarations that SAST wouldn\u2019t catch."},{n:"CodeQL (build-time mode)",d:"For compiled languages (Java, Go, C++), CodeQL can monitor the build process tree \u2014 comparing compiler output to source. Catches vulnerabilities that only become visible during compilation. Complements the PR-gate CodeQL scan at Stage 1."},{n:"Unit Security Tests",d:"Developer-written tests validating auth boundaries, input sanitization, and crypto usage \u2014 run as part of the test suite post-build"}],orca:[{n:"Shift-Left IaC Scanning",d:"Scans Terraform, Helm, CloudFormation, and K8s manifests for 1,600+ misconfiguration rules. Contextual risk scoring based on internet exposure and data sensitivity."}],rq:null,incident:{year:"2021",name:"ua-parser-js npm Hijacking",summary:"Attackers compromised the npm account of the maintainer of ua-parser-js (8M+ weekly downloads) and published three malicious versions that installed cryptominers on Linux/Windows and a password-stealing trojan. The malicious packages were live for ~4 hours before detection. Because dependency resolution happens at build time, any CI pipeline that ran npm install during that window pulled compromised code into production artifacts.",lesson:"SCA scanning on the built artifact (not just lockfiles) catches malicious packages that passed through during resolution. Dependency pinning with integrity hashes (package-lock.json with shasum) would have rejected the tampered package. Build-time behavioral analysis tools like Socket.dev detect suspicious post-install scripts before they execute."}},
{id:4,n:"SCAN & SIGN",st:"Binary Authorization Gate",ic:"\u{1F510}",lp:"CI \u2192 CD SECURITY GATE",t:"gate",desc:"THE CRITICAL GATE between CI and CD. Every container image must be scanned for vulnerabilities, signed with cryptographic attestations, and generate an SBOM before deployment. Binary Authorization enforces this \u2014 unsigned images are rejected at admission.",th:[{n:"Vulnerable Images",d:"Known CVEs (Critical/High) in OS packages, language runtimes, or app dependencies"},{n:"Image Tampering",d:"Man-in-the-middle modification of images between registry and deployment"},{n:"Registry Compromise",d:"Unauthorized push of malicious images to trusted registry paths"},{n:"Missing SBOMs",d:"No software bill of materials makes incident response impossibly slow"},{n:"Tag Mutability",d:"Mutable tags (e.g., :latest) allow silent replacement of known-good images"}],gcp:[{n:"Artifact Registry",d:"Immutable image storage with vulnerability scanning, tag immutability, and cleanup policies"},{n:"Container Analysis",d:"Automated CVE scanning on push using the OSV vulnerability database"},{n:"Binary Authorization",d:"Admission controller requiring signed attestations before GKE schedules a pod"},{n:"Cloud KMS (Signing)",d:"HSM-backed asymmetric keys for image signing; private keys never leave Google\u2019s infra"}],tl:[{n:"Cosign (Sigstore)",d:"Keyless container image signing and verification with transparency log (Rekor)"},{n:"Trivy / Grype (SCA)",d:"Fast, comprehensive CVE and SCA scanning: OS packages, language dependencies, and SBOM-aware recursive scanning"},{n:"Syft",d:"SBOM generator producing SPDX and CycloneDX formats"},{n:"in-toto",d:"Supply chain attestation framework with cryptographic proof of each pipeline step"},{n:"Digest Pinning",d:"Reference images by SHA256 digest, not mutable tags"}],orca:[{n:"Agentless Image Scanning",d:"Scans container images without agents or registry access. Context-aware vulnerability prioritization: a Critical CVE in an internet-facing workload ranks higher than the same CVE in an internal batch job."}],rq:null,incident:{year:"2024",name:"Docker Hub Poisoned Images (5M+ Pulls)",summary:"Researchers at JFrog discovered thousands of malicious container images on Docker Hub, including typosquatted versions of popular images. Some had accumulated over 5 million pulls. The images contained cryptominers, credential stealers, and reverse shells. Many passed basic vulnerability scans because the malicious payloads were in custom application layers, not in known CVE-affected OS packages.",lesson:"Binary Authorization and image signing are the definitive controls. If your cluster only admits images with valid attestations from your own pipeline, poisoned public images are rejected at admission regardless of how convincing they look. Digest pinning (not tag-based references) prevents silent image replacement."}},
{id:5,n:"DEPLOY",st:"GKE Admission & GitOps",ic:"\u{1F4E6}",lp:"CD PIPELINE",t:"cd",desc:"Workloads deployed to GKE through GitOps or CI-driven pipelines. Admission controllers enforce policy at the cluster gate \u2014 rejecting misconfigured, unsigned, or overly-privileged pod specs before they run.",th:[{n:"Misconfigured Clusters",d:"Public API servers, legacy ABAC, disabled audit logging, overly permissive default SAs"},{n:"RBAC Over-Privilege",d:"Cluster-admin bindings to service accounts, wildcard verbs, namespace-crossing roles"},{n:"Insecure Pod Specs",d:"privileged: true, hostPID, hostNetwork, writable hostPath mounts, SYS_ADMIN capabilities"},{n:"Unauthorized Images",d:"Deploying images that bypassed the scanning/signing gate"},{n:"Missing Network Policies",d:"Default-allow east-west traffic enabling lateral movement"},{n:"Unprotected API Endpoints",d:"APIs exposed without rate limiting, authentication enforcement, or WAF protection. GKE microservices often expose internal APIs via Ingress without Cloud Armor policies"}],gcp:[{n:"GKE Autopilot",d:"Google-managed hardened nodes: no SSH, no privileged containers, mandatory resource limits"},{n:"Binary Authorization",d:"Cluster-level admission: only images with valid attestations are schedulable"},{n:"Policy Controller",d:"OPA Gatekeeper managed by Google for PodSecurity Standards, image allowlists, label requirements"},{n:"Config Sync",d:"GitOps for GKE: cluster state declared in Git, automatically reconciled, with drift detection"},{n:"Workload Identity",d:"Map K8s ServiceAccounts to GCP IAM; pods get scoped credentials without key files"},{n:"Cloud Armor (WAF)",d:"L7 DDoS protection, pre-configured WAF rules (OWASP Top 10, SQLi, XSS), bot management, and adaptive protection for GKE Ingress and Gateway API endpoints"}],tl:[{n:"ArgoCD / Flux",d:"GitOps controllers reconciling desired state from Git; all deployments auditable and reversible"},{n:"Kyverno / Gatekeeper",d:"Policy engines for K8s admission: pod security, resource quotas, label standards"},{n:"Namespace Isolation",d:"Tenant separation with ResourceQuotas, LimitRanges, and NetworkPolicies per namespace"},{n:"Istio Service Mesh (Zero-Trust)",d:"Implements zero-trust network architecture: mTLS between all pods (no implicit trust), fine-grained AuthorizationPolicies per service, and full traffic observability via Kiali and Jaeger"},{n:"OWASP ZAP (DAST)",d:"Dynamic Application Security Testing against deployed staging/canary environments. Requires a running target — probes live HTTP endpoints for injection, auth bypass, and misconfig. Run post-deploy against ephemeral staging before production promotion"},{n:"Threat Modeling",d:"Structured risk assessment (STRIDE, PASTA, attack trees) during deployment planning. Identifies architecture-level threats that static tools cannot detect: trust boundary violations, data flow risks, and privilege escalation paths"}],orca:[{n:"KSPM (K8s Security Posture)",d:"Continuous assessment of GKE cluster configurations against CIS Kubernetes Benchmarks. Detects RBAC drift, missing network policies, and overly permissive pod specs without agents."}],rq:null,incident:{year:"2022",name:"Autopilot Vulnerability \u2014 GKE Privilege Escalation (CVE-2022-0811)",summary:"Security researchers demonstrated \u201Ccr8escape\u201D \u2014 a vulnerability in CRI-O (the container runtime) that allowed any user who could deploy a pod to escape the container and gain root on the host node. In GKE Standard clusters, this gave full node access. The attack exploited kernel parameters that could be set via pod annotations, bypassing all container isolation. Google patched GKE within days of disclosure.",lesson:"GKE Autopilot\u2019s locked-down node configuration blocks this entire attack class by preventing custom pod annotations, disabling SSH, and enforcing mandatory security contexts. Admission controllers (Policy Controller, Kyverno) should deny pods requesting dangerous kernel parameters, hostPID, or hostNetwork. Defense-in-depth means assuming container escape is possible and limiting blast radius."}},
{id:6,n:"RUNTIME",st:"Workload Protection in GKE",ic:"\u26A1",lp:"CD PIPELINE",t:"cd",desc:"Containers running in production. Runtime is the highest-stakes phase \u2014 this is where attackers actually operate. Defense-in-depth layers: sandboxing, identity, network segmentation, and behavioral monitoring must all be active simultaneously.",th:[{n:"Container Escape",d:"Kernel exploits or misconfigured capabilities allowing breakout to host"},{n:"Privilege Escalation",d:"Exploiting writable ServiceAccount tokens, node metadata endpoints, or RBAC misconfig"},{n:"Cryptomining",d:"Compromised pods mining cryptocurrency, often the first indicator of a broader breach"},{n:"Lateral Movement",d:"Pivoting from a compromised pod to adjacent services via exposed APIs or shared secrets"},{n:"Data Exfiltration",d:"Staging and exfiltrating data through DNS tunneling, steganography, or authorized egress"},{n:"Zero-Day Exploitation",d:"Runtime attacks exploiting unknown vulnerabilities in application code or dependencies"}],gcp:[{n:"GKE Sandbox (gVisor)",d:"User-space kernel intercepting all syscalls; container escape requires defeating both gVisor and host kernel"},{n:"Shielded GKE Nodes",d:"Secure Boot + vTPM + integrity monitoring prevents rootkits"},{n:"Confidential GKE Nodes",d:"AMD SEV memory encryption; data encrypted in memory"},{n:"VPC Service Controls",d:"Security perimeters around GCP services preventing data exfiltration"},{n:"Container Threat Detection",d:"Detects reverse shells, crypto miners, malicious binaries, suspicious library loads"},{n:"Cloud Armor (Runtime WAF)",d:"Adaptive protection: ML-based L7 DDoS detection, rate limiting, geo-blocking, and custom WAF rules active on all internet-facing GKE services via Ingress/Gateway"},{n:"Workload Identity",d:"Short-lived, auto-rotated tokens; no key files"}],tl:[{n:"Falco",d:"Runtime syscall monitoring using eBPF for anomalous behavior detection"},{n:"Seccomp Profiles",d:"Restrict syscalls per container to a minimal allowlist"},{n:"AppArmor/SELinux",d:"Mandatory access control limiting file, network, and capability access per pod"},{n:"Read-only Root FS",d:"readOnlyRootFilesystem: true forces attackers to use tmpfs"},{n:"Non-root Containers",d:"runAsNonRoot: true eliminates trivial privilege escalation"},{n:"EDR Agent (CrowdStrike/SentinelOne)",d:"Endpoint Detection & Response on GKE nodes: kernel-level behavioral monitoring, fileless malware detection, and automated host isolation. Complements container-level Falco with host-level visibility across the node OS"}],orca:[{n:"Agentless Runtime Protection",d:"Detects runtime vulnerabilities and malware without sidecars or DaemonSets. SideScanning\u2122 reads workload runtime block storage out-of-band via the cloud control plane."}],rq:[{n:"Runtime Alert Ingestion",d:"GreyMatter ingests GKE runtime alerts (Container Threat Detection, Falco) and correlates with broader environment signals."}],incident:{year:"2023",name:"Scarleteel \u2014 Container-to-Cloud Attack Chain",summary:"Sysdig\u2019s Threat Research Team documented the Scarleteel operation: attackers exploited a vulnerable public-facing container to gain initial access, escaped the container, used IMDS to steal cloud credentials from the node\u2019s metadata service, then pivoted to AWS services (Lambda, S3, CloudTrail) to disable logging, steal data, and deploy cryptominers across the account. The entire kill chain \u2014 from container compromise to cloud account takeover \u2014 took minutes.",lesson:"Runtime defense must include IMDS restriction (Workload Identity replaces node metadata access), network egress controls (deny all, then allowlist), and behavioral monitoring (Falco detecting credential access patterns). gVisor sandboxing prevents the container escape that initiates this entire attack chain."}},
{id:7,n:"MONITOR & DETECT",st:"Continuous Threat Detection",ic:"\u{1F4E1}",lp:"CD PIPELINE",t:"cd",desc:"Continuous monitoring correlating signals across the pipeline and infrastructure. This is where threats that bypassed preventive controls are detected \u2014 through behavioral anomalies, drift detection, or threat intelligence matching.",th:[{n:"Undetected Breaches",d:"Average breach lifecycle (identification + containment) is 241 days per IBM 2025 Cost of a Data Breach Report, the lowest in nine years; median dwell time per Mandiant M-Trends 2025 is 11 days (up from 10 in 2023), but many non-ransomware intrusions persist far longer"},{n:"Configuration Drift",d:"Manual kubectl changes bypass GitOps, creating undocumented cluster state"},{n:"Compliance Violations",d:"Workloads drifting out of CIS, SOC 2, PCI-DSS, ISO 27001, or HIPAA compliance"},{n:"Insider Threats",d:"Authorized users exfiltrating data or planting backdoors"},{n:"Alert Fatigue",d:"High false-positive rates causing analysts to ignore critical alerts"}],gcp:[{n:"Security Command Center",d:"Unified dashboard: vulnerability findings, threat detections, compliance status, attack path analysis"},{n:"Google SecOps (Chronicle SIEM)",d:"Petabyte-scale telemetry retention with sub-second search and YARA-L detection rules. Formerly Chronicle SIEM, now unified under Google SecOps with integrated SOAR and threat intelligence"},{n:"Event Threat Detection",d:"Detects brute force, crypto mining, IAM anomalies, data exfil from Cloud Audit Logs"},{n:"Cloud Logging + Log Analytics",d:"Centralized GKE audit logs, container stdout/stderr, VPC Flow Logs with BigQuery analytics"},{n:"Cloud Monitoring",d:"Metrics, uptime checks, alerting policies for GKE health"}],tl:[{n:"Threat Intelligence Feeds",d:"IOC matching against known malicious IPs, domains, file hashes"},{n:"Anomaly Detection (ML)",d:"Baseline normal behavior, alert on statistical deviations"},{n:"GKE Audit Logging",d:"Admin Activity and Data Access logs for every K8s API call"}],orca:[{n:"CNAPP Unified Dashboard",d:"Single pane correlating vulnerabilities, misconfigurations, lateral movement risks, and compliance across GKE, GCE, and Cloud Run. Attack path analysis for multi-step exploitation chains."},{n:"Compliance Frameworks",d:"Continuous assessment against CIS GKE Benchmarks, SOC 2, PCI-DSS, HIPAA, ISO 27001, NIST 800-53 with automated evidence collection and audit-ready reporting."}],rq:[{n:"GreyMatter MDR Platform",d:"24/7 SOC monitoring GCP and GKE. Correlates alerts from SCC, Google SecOps (Chronicle), Falco, and Orca. Per ReliaQuest, reduces MTTD by 60% through cross-platform correlation."},{n:"Threat Intelligence",d:"Proprietary feed integrated with Google SecOps (Chronicle) for IOC matching, campaign tracking, adversary TTP mapping."},{n:"Alert Triage & Enrichment",d:"Automated enrichment with asset context, user behavior, and threat intel. Human validation before escalation."}],incident:{year:"2020\u20132021",name:"SolarWinds Sunburst \u2014 18,000 Organizations Compromised",summary:"Russian SVR operatives (APT29/Cozy Bear) compromised SolarWinds\u2019 Orion build system and injected a backdoor (SUNBURST) into legitimate software updates. 18,000+ organizations \u2014 including US Treasury, DHS, DOJ, and Fortune 500 companies \u2014 installed the trojanized update. The attackers remained undetected for 9+ months, exfiltrating sensitive data through DNS beaconing that mimicked legitimate Orion traffic. Detection finally came from FireEye\u2019s own breach investigation.",lesson:"This is the definitive case for continuous monitoring with behavioral analytics. Signature-based detection was useless because the malware was signed with legitimate SolarWinds certificates. Detection required anomaly-based approaches: unusual DNS patterns, unexpected outbound connections, and threat intel correlation. YARA-L rules and cross-platform correlation (Google SecOps) are designed to catch exactly this pattern."}},
{id:8,n:"RESPOND",st:"Incident Response & Remediation",ic:"\u{1F6E1}\uFE0F",lp:"FEEDS BACK \u2192 CI",t:"cd",desc:"When threats are detected, automated and human-driven response kicks in. Speed is everything \u2014 automated playbooks contain threats in seconds while human analysts investigate root cause. Findings feed back into CI as new security requirements.",th:[{n:"Slow Response (MTTR)",d:"Manual processes delay containment"},{n:"Incomplete Remediation",d:"Patching symptom without fixing root cause"},{n:"Evidence Destruction",d:"Pod restarts and autoscaling destroy forensic evidence"},{n:"Blast Radius Spread",d:"Failure to isolate compromised workloads"},{n:"Recurrence",d:"No post-incident learnings fed back into pipeline"}],gcp:[{n:"Google SecOps SOAR",d:"Automated response playbooks: isolate pods, revoke tokens, snapshot nodes, notify teams. Unified under Google SecOps with Chronicle for detection-to-response in a single platform"},{n:"Cloud Functions",d:"Event-driven automation: auto-quarantine on SCC finding, auto-patch on CVE alert"},{n:"GKE Node Auto-Repair",d:"Automatic replacement of unhealthy nodes"},{n:"Pub/Sub Event Bus",d:"Decouple detection from response: SCC findings \u2192 Pub/Sub \u2192 multiple response handlers"}],tl:[{n:"GitOps Rollback",d:"git revert \u2192 ArgoCD auto-syncs \u2192 production rolled back in seconds"},{n:"Pod/Namespace Isolation",d:"kubectl cordon + NetworkPolicy deny-all for immediate containment"},{n:"Forensic Capture",d:"Snapshot node disk, export container filesystem, capture logs before termination"},{n:"Post-Incident Review",d:"Blameless retrospectives generating new detection rules and hardened policies"},{n:"Automated CVE Patching",d:"Detection triggers automated rebuild of affected images"}],orca:[{n:"Remediation Guidance",d:"Context-aware remediation steps with auto-generated Terraform/kubectl commands. Risk-based prioritization."}],rq:[{n:"MDR Incident Response",d:"24/7 hands-on-keyboard response: containment, forensic investigation, recovery. Per ReliaQuest, MTTR under 5 minutes for Critical severity through agentic AI automation."},{n:"Threat Hunting",d:"Proactive hypothesis-driven hunts finding threats automated detection missed. Findings become Google SecOps YARA-L detection rules."},{n:"Containment Actions",d:"Remote response: isolate GKE nodes, kill pods, revoke tokens, block IOCs at perimeter."}],incident:{year:"2025",name:"M&S / Co-op / Harrods \u2014 Scattered Spider Retail Attacks",summary:"In April\u2013May 2025, the Scattered Spider group (UNC3944) hit multiple major UK retailers in rapid succession. Marks & Spencer was breached via a phishing attack that tricked IT helpdesk staff into resetting admin credentials at a third-party vendor. The attackers deployed DragonForce ransomware, taking M&S\u2019s online ordering system offline for weeks. Estimated damages exceeded \u00A3300M in lost sales and recovery costs. Co-op proactively shut systems to contain spread.",lesson:"Incident response speed is everything. Co-op\u2019s decision to proactively shut systems, while costly, likely prevented a full-scale breach. Automated playbooks (Google SecOps SOAR) that can isolate systems within seconds of confirmed compromise dramatically reduce blast radius. The feedback loop matters: phishing training, vendor credential management, and helpdesk verification procedures all feed back to Stage 1 as hardened processes."}}
];

1:{challenge:"With thousands of developers committing across hundreds of repos around the clock, a small security team cannot manually review every PR for secrets, vulnerabilities, or malicious commits. SAST must run automatically as a PR gate \u2014 blocking merge on critical findings \u2014 so developers get immediate feedback while the code is still fresh. A single leaked service account key or SQL injection that slips past the PR stage propagates through the entire pipeline.",
items:[
{n:"PR-Gate SAST Orchestration",tag:"AUTOMATION",tc:"auto",ico:"\u{1F6A7}",d:"Webhook-driven: every PR open or update triggers parallel Semgrep and SonarQube scans automatically. Results post as PR comments within minutes. Critical findings block merge via branch protection status checks \u2014 the developer cannot merge until resolved. The entire feedback loop happens while they're still in context on that code. Same pattern as Meta Conveyer/Citadel and Synthesis: 'done' means all scans pass.",tools:["Semgrep","SonarQube","GitHub Advanced Security","Branch Protection"]},
{n:"Context-Aware Secret Detection",tag:"AI AGENT",tc:"agent",ico:"\u{1F9E0}",d:"Beyond regex pattern matching \u2014 AI classifiers trained to evaluate high-entropy strings in context, distinguishing real API keys from test fixtures, base64 config blobs, and documentation examples. Significantly reduces false positives over pure regex tools like gitleaks while catching obfuscated credentials.",tools:["gitleaks","truffleHog","Custom ML Model"]},
{n:"Dependency Risk Scoring Agent",tag:"AUTOMATION",tc:"auto",ico:"\u{1F4E6}",d:"Continuously monitors every go.sum, package-lock.json, and requirements.txt across all repos. Cross-references against OSV, GitHub Advisory DB, and behavioral signals: new maintainer on a critical package, sudden spike in published versions (indicators of dependency confusion/hijacking). Auto-creates PRs to pin or replace risky deps.",tools:["Socket.dev","Renovate","OSV API"]},
{n:"Commit Anomaly Detection",tag:"ML MODEL",tc:"ml",ico:"\u{1F4CA}",d:"ML model trained on each developer\u2019s commit patterns (file types touched, commit frequency, typical paths). Flags statistical outliers: a frontend developer suddenly modifying Helm charts at 3 AM, or a batch of commits bypassing the normal PR flow. Catches compromised accounts before code reaches build.",tools:["Google SecOps (Chronicle)","Cloud Audit Logs"]},
{n:"AI-Assisted PR Security Triage",tag:"AI AGENT",tc:"agent",ico:"\u{1F50D}",d:"An LLM agent performs first-pass review of every PR touching IaC, K8s manifests, or security-sensitive paths (identified via CODEOWNERS). Checks for overly permissive IAM bindings, public ingress definitions, missing encryption-at-rest configs. Triages so the security team only reviews PRs that actually need human eyes.",tools:["Semgrep","Custom LLM","CODEOWNERS"]},
{n:"Self-Healing Secret Rotation",tag:"AUTOMATION",tc:"auto",ico:"\u{1F504}",d:"When a secret is detected in a commit (even in git history), an automated pipeline immediately rotates the credential via Secret Manager API, invalidating the leaked value before an attacker can use it, and opens an incident ticket with full context.",tools:["Secret Manager API","Cloud Functions","PagerDuty"]}
]},
2:{challenge:"Thousands of container images built daily across multiple teams, each pulling from different base images and dependency trees. The security team cannot audit every Dockerfile or validate every base image. A single compromised build cache or poisoned base image can propagate malicious code into hundreds of production services silently.",
items:[
{n:"Golden Base Image Curation Pipeline",tag:"AUTOMATION",tc:"auto",ico:"\u{1F3E0}",d:"An automated pipeline that maintains a curated base image registry. Continuously rebuilds distroless and approved base images on a schedule, runs CVE scans, signs them, and publishes to Artifact Registry. Any team image not derived from the golden set is flagged and blocked at build time. Zero human intervention for the 95% path.",tools:["Cloud Build","Artifact Registry","Cosign"]},
{n:"SLSA Provenance Verification Agent",tag:"AUTOMATION",tc:"auto",ico:"\u{1F50F}",d:"Automatically generates and verifies SLSA Level 3 attestations for every build. Validates the full chain: source commit \u2192 build config \u2192 artifact digest. Any break in provenance triggers an automatic hold and alert. The only scalable way to guarantee supply chain integrity across thousands of daily builds.",tools:["Cloud KMS","in-toto","SLSA Framework"]},
{n:"AI-Enhanced Dockerfile Linter",tag:"AI AGENT",tc:"agent",ico:"\u{1F9EA}",d:"Beyond static rules \u2014 an LLM-based agent analyzes Dockerfiles for anti-patterns that tools miss: multi-stage builds that inadvertently leak build args, COPY . . patterns that pull in .env files, or build commands that fetch unverified external resources. Suggests fixes inline in the PR.",tools:["Hadolint","Custom LLM","Cloud Build"]},
{n:"Ephemeral Build Enforcement",tag:"AUTOMATION",tc:"auto",ico:"\u{1F6E1}\uFE0F",d:"Verifies every Cloud Build execution ran on a fresh, ephemeral worker with no cache carryover. If any build attempts to use persistent storage or mount external volumes, it is terminated and flagged. Critical at scale where teams may try to speed up builds by sharing caches \u2014 which enables supply-chain injection.",tools:["Cloud Build","Policy Controller","Cloud Audit Logs"]},
{n:"Automated Image Slimming",tag:"AUTOMATION",tc:"auto",ico:"\u2702\uFE0F",d:"Analyzes built images, identifies unnecessary packages and layers, and auto-generates optimized multi-stage Dockerfiles. Reduces CVE surface across the fleet without requiring each team to become a container optimization expert. A slimmed image with 40 fewer packages is 40 fewer things to patch.",tools:["Slim (formerly DockerSlim)","Syft","Artifact Registry"]}
]},
3:{challenge:"Source SAST ran at Stage 1 as a PR gate — but post-build introduces a new problem: SCA on the actual resolved dependency tree, IaC scanning on rendered manifests, and CodeQL build-time monitoring for compiled languages. Running these checks across hundreds of repos and thousands of builds daily generates an avalanche of findings across two different stages. The risk: teams treat Stage 3 as redundant with Stage 1 and start skipping it, leaving compiler-induced vulnerabilities and IaC misconfigurations undetected.",
items:[
{n:"AI-Powered SCA Finding Triage",tag:"AI AGENT",tc:"agent",ico:"\u{1F3AF}",d:"Ingests all SCA and IaC findings post-build and applies contextual risk scoring. A vulnerable dependency in an internet-facing payment service gets Critical priority; the same CVE in an internal batch job with no network access gets Low. Deduplicates across Snyk, Socket.dev, and Checkov. Prevents the 'alert fatigue' failure mode where teams ignore Stage 3 because it feels redundant with Stage 1 SAST.",tools:["Snyk","Socket.dev","Orca Security","Checkov"]},
{n:"LLM-Generated Fix Suggestions",tag:"AI AGENT",tc:"agent",ico:"\u{1F4DD}",d:"When a scanner finding is confirmed, an AI agent generates a specific code fix in the developer\u2019s language and framework, opens a PR with the fix, and includes an explanation of the vulnerability. This pattern is proven \u2014 GitHub Copilot Autofix uses the same approach. Developers get a ready-to-merge fix instead of cryptic scanner output.",tools:["GitHub Copilot Autofix","Custom LLM","Semgrep"]},
{n:"Automated IaC Policy Enforcement",tag:"AUTOMATION",tc:"auto",ico:"\u{1F6A7}",d:"Runs Checkov/tfsec against every Terraform plan (not just the code) and compares against a policy-as-code baseline. If a change would create a public GKE API server or remove a NetworkPolicy, the plan is blocked automatically with a clear explanation \u2014 no security team review needed for known-bad patterns.",tools:["Checkov","tfsec","OPA","Cloud Build"]},
{n:"Dynamic Test Orchestration",tag:"AUTOMATION",tc:"auto",ico:"\u{1F3AD}",d:"Decides which scanners to run based on what changed. A PR that only modifies CSS skips deep SCA scans. A PR changing authentication logic gets Semgrep with auth-specific rulesets + full dependency tree analysis. A PR modifying Terraform gets Checkov with GKE-specific policies. Optimizes pipeline time (critical when running thousands of builds/day) while maintaining coverage where it matters.",tools:["Cloud Build","Semgrep","Checkov","Socket.dev"]},
{n:"Continuous Benchmark Compliance",tag:"AUTOMATION",tc:"auto",ico:"\u2705",d:"Continuously validates all Helm charts and K8s manifests against CIS Kubernetes Benchmarks and organizational policies. Non-compliant configs are auto-blocked from merging with specific remediation guidance, removing the security team from the loop for routine policy violations.",tools:["Checkov","Orca Shift-Left","Policy Controller"]}
]},
4:{challenge:"Every image destined for production must be scanned, signed, and have an SBOM generated. With thousands of images and frequent rebuilds, this gate becomes a bottleneck if any step requires manual approval. But making it too loose defeats its purpose \u2014 this is the hard cryptographic boundary between CI and CD.",
items:[
{n:"Risk-Based Auto-Signing Policy Engine",tag:"AUTOMATION",tc:"auto",ico:"\u2705",d:"Automatically signs images meeting all policy criteria: zero Critical CVEs, valid SLSA provenance, SBOM generated, from approved base image. Images that almost pass (e.g., one High CVE with a known mitigating control) are routed for expedited human review with full context. Only truly exceptional cases reach the security team.",tools:["Binary Authorization","Cosign","Cloud KMS"]},
{n:"Automated CVE Impact Analysis",tag:"AI AGENT",tc:"agent",ico:"\u{1F4A5}",d:"When a new Critical CVE is published, instantly cross-references against every SBOM in the registry and identifies exactly which production images are affected, which GKE clusters they run in, and whether the vulnerable code path is reachable. Turns a \u201Ccheck 3,000 images\u201D panic into \u201Cthese 12 services need patching, prioritized by exposure.\u201D",tools:["Syft","Container Analysis","Orca Agentless"]},
{n:"SBOM Lifecycle Agent",tag:"AUTOMATION",tc:"auto",ico:"\u{1F4CB}",d:"Continuously maintains and updates SBOMs for every image in the registry. When a dependency is later found vulnerable (post-push), the agent retroactively flags all images containing it, triggers re-scans, and can automatically initiate rebuilds of affected images without human intervention.",tools:["Syft","Artifact Registry","Cloud Build"]},
{n:"Tag Immutability Enforcement",tag:"AUTOMATION",tc:"auto",ico:"\u{1F512}",d:"Rejects any deployment manifest referencing a mutable tag (:latest, :stable). Auto-rewrites manifests to use SHA256 digests before they enter the CD pipeline, and maintains a mapping of human-readable tags to digests for developer convenience. Eliminates silent image replacement attacks.",tools:["Policy Controller","Kyverno","Artifact Registry"]},
{n:"Attestation Chain Validator",tag:"AUTOMATION",tc:"auto",ico:"\u{1F517}",d:"Verifies the complete attestation chain for every image: source provenance \u2192 build attestation \u2192 scan results \u2192 signing attestation. Any gap in the chain blocks deployment. At scale with thousands of images, this is the only way to maintain supply chain integrity without manual auditing.",tools:["in-toto","Binary Authorization","Cosign"]}
]},
5:{challenge:"Thousands of deployments daily across dozens of GKE clusters spanning multiple regions. Each deployment involves admission control, RBAC validation, network policy enforcement, and GitOps reconciliation. A small security team cannot review every deployment, but a single misconfigured pod spec (privileged: true, hostNetwork) can compromise an entire node.",
items:[
{n:"Context-Aware Admission Control",tag:"AI AGENT",tc:"agent",ico:"\u{1F6E1}\uFE0F",d:"Beyond static OPA/Gatekeeper policies \u2014 an enhanced admission controller that differentiates between a legitimate need for elevated privileges (a CNI plugin DaemonSet) and a developer accidentally copying privileged: true from a Stack Overflow example. Context-aware exceptions with automatic time-bound expiration.",tools:["Policy Controller","Gatekeeper","Kyverno"]},

{n:"Autonomous Threat Containment",tag:"AI AGENT",tc:"agent",ico:"\u26A1",d:"Takes immediate containment actions when high-confidence threats are detected: isolate a pod\u2019s network (apply deny-all NetworkPolicy), kill a suspected cryptomining process, or cordon a node showing escape indicators. Operates within pre-approved playbooks \u2014 no human in the loop for initial containment, but immediate escalation for investigation. At scale, this is the difference between 30-second and 30-minute containment.",tools:["Google SecOps SOAR","Falco","Container Threat Detection"]},
{n:"Per-Workload Behavioral Baselines",tag:"ML MODEL",tc:"ml",ico:"\u{1F4CA}",d:"ML models trained per workload type that learn \u201Cnormal\u201D: which syscalls a payment service makes, which DNS names it resolves, which network endpoints it communicates with. Anomalies trigger immediate investigation. Catches zero-days and novel attacks that signature-based detection misses entirely.",tools:["Falco","Google SecOps (Chronicle)","Cloud Monitoring"]},

// Priority summary table — column order: Priority > Impact > Maturity > Ease > Safety Risk

h+='<table class="score-tbl"><thead><tr><th>Recommendation</th><th>Priority</th><th>Impact</th><th>Maturity</th><th>Ease</th><th>Safety Risk</th></tr></thead><tbody>';
items.forEach(function(obj){
var it=obj.item,sc=obj.score;
h+='<tr><td>'+it.n+'</td>';
h+='<td>'+priPill(sc.priority||'P4')+'</td>';
h+='<td>'+impPill(sc.impact||'MEDIUM')+'</td>';
h+='<td>'+matPill(sc.maturity||'EMERGING')+'</td>';
h+='<td>'+easePill(sc.ease||'MODERATE')+'</td>';
h+='<td>'+safetyPill(sc.safety||'MED')+'</td>';
h+='</tr>'});
h+='</tbody></table>';

// Detailed cards (sorted by priority)
h+='<div class="am-section-title">Detailed Recommendations</div>';
h+='<div class="amlist">';
items.forEach(function(obj){
var it=obj.item,sc=obj.score;
h+='<div class="amai"><div class="amai-h"><div class="amai-ico">'+it.ico+'</div><div class="amai-n">'+priPill(sc.priority||'P4')+' '+it.n+'</div><span class="amai-tag '+it.tc+'">'+it.tag+'</span></div><div class="amai-d">'+it.d+'</div>';
// Scoring row — same column order as table
h+='<div class="amai-scores">';
h+='<div class="amai-score-item"><span class="amai-score-label">Impact:</span>'+impPill(sc.impact||'MEDIUM')+'</div>';
h+='<div class="amai-score-item"><span class="amai-score-label">Maturity:</span>'+matPill(sc.maturity||'EMERGING')+'</div>';
h+='<div class="amai-score-item"><span class="amai-score-label">Ease:</span>'+easePill(sc.ease||'MODERATE')+'</div>';
h+='<div class="amai-score-item"><span class="amai-score-label">Safety:</span>'+safetyPill(sc.safety||'MED')+'</div>';
h+='</div>';
// Rationale
if(sc.rationale){h+='<div style="margin-top:8px;font-size:.72rem;color:var(--text3);font-style:italic;line-height:1.4">'+sc.rationale+'</div>'}
if(it.tools&&it.tools.length){h+='<div class="amai-tools">';it.tools.forEach(function(t){h+='<span class="amai-tool">'+t+'</span>'});h+='</div>'}
h+='</div>'});
h+='</div>';
bd.innerHTML=h;o.classList.add('on')}
function cam(){document.getElementById('amo').classList.remove('on')}
document.getElementById('mcl').addEventListener('click',cm);
document.getElementById('amcl').addEventListener('click',cam);
document.getElementById('mo').addEventListener('click',function(e){if(e.target===e.currentTarget)cm()});
document.getElementById('amo').addEventListener('click',function(e){if(e.target===e.currentTarget)cam()});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){cam();cm()}if(e.key==='Enter'&&(e.target.classList.contains('sc')||e.target.classList.contains('gc4')))e.target.click()});
render();
scaleCanvas();
window.addEventListener('resize',scaleCanvas);
</script>
</body>
</html>
